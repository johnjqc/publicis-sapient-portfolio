server:
  port: 8083

spring:
  application:
    name: market-simulator
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}

market-simulator:
  tick-interval-ms: 10000
  instruments:
    - symbol: AAPL
      starting-price: 201.35
      volatility-basis-points: 15.0
    - symbol: MSFT
      starting-price: 468.12
      volatility-basis-points: 12.0
    - symbol: NVDA
      starting-price: 180.52
      volatility-basis-points: 30.0

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.investment.marketsimulator: INFO
